name: Quarterly Ops Drill

on:
  schedule:
    - cron: '0 7 1 */3 *'
  workflow_dispatch:

jobs:
  ops-drill:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Quarterly Ops Drill
        run: npm run ops:quarterly-drill

      - name: Upload Ops Drill Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quarterly-ops-drill-artifacts
          path: reports/ops/
