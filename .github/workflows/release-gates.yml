name: Release Gates

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Run Phase-1 Verify (Budget Enforced)
        run: node scripts/ci/run-with-budget.mjs --label verify_phase1 --budget-seconds 1800 -- npm run verify:phase1

      - name: Enforce Runtime SLO (Phase-1)
        run: node scripts/operations/check-runtime-slo.mjs --policy reports/ops/packs/runtime_slo_policy.v1.json --label verify_phase1 --enforce

      - name: Run Release Gates
        run: npm run verify:release-gates -- --skip phase1

      - name: Upload CI Runtime Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-runtime-artifacts
          path: reports/ci/
